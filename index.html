<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      * {
        margin: 0px;
        padding: 0px;
      }

      #result {
        width: 90%;
        margin: 0px auto;
        min-height: 100px;
        border-radius: 32px;
        margin-top: 34px;
        background-color: #f5f5f5;
        padding: 20px 50px;
        max-height: 50vh;
        /* overflow: scroll; */
      }

      #title_heading {
        text-align: center;
        background-color: #212121;
        padding: 15px 0px;
        color: #dedede;
        font-size: 27px;
        font-weight: lighter;
      }

      #title_heading:hover {
        color: white;
        cursor: pointer;
      }

      #query-div {
        width: 90%;
        margin: auto;
      }

      #query-div label {
        display: block;
        margin: 10px 0px;
      }

      input:focus {
        outline: none;
        font-size: 18px;
      }
    </style>
    <!-- <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/showdown@2.1.0/dist/showdown.min.js"></script>
  </head>
  <body>
    <h1
      id="title_heading"
      style="
        text-align: center;
        background-color: #212121;
        padding: 15px 0px;
        color: #dedede;
      "
    >
      Chat AKTI
    </h1>
    <div style="width: 100%">
      <div id="query-div">
        <label for="">What you want to know?</label>
        <input
          type="text"
          id="queryinput"
          style="width: 100%; border: 2px solid black; min-height: 30px"
        />
      </div>
    </div>

    <div style="width: 100%">
      <div id="result"></div>
    </div>
    <script>
      // groq cloud api key
      API_Key = "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";
      queryInput = document.getElementById("queryinput");

      //   getting query from user and processing it
      queryInput.addEventListener("change", function () {
        queryText = queryInput.value;
        console.log(queryText);
        document.getElementById("result").innerHTML =
          "Waiting for Response ....";
        getResponse(queryText);
      });

      function getResponse(userquery) {
        fetch("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${API_Key}`,
          },
          body: JSON.stringify({
            messages: [
              {
                role: "user",
                content: userquery,
              },
            ],
            model: "llama3-8b-8192",
          }),
        })
          .then((response) => response.json())
          .then((data) => {
            console.log(data);
            markdownContent = data["choices"][0]["message"]["content"];
            htmlContent = mardowntoHTMLConversion(markdownContent);
            document.getElementById("result").innerHTML = htmlContent;
          })
          .catch((error) => console.error("Error:", error));
      }

      function mardowntoHTMLConversion(markdownContent) {
        const converter = new showdown.Converter();
        const htmlContent = converter.makeHtml(markdownContent);
        return htmlContent;
      }
    </script>
  </body>
</html>
